<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>외계어 음향-의미 해독 시뮬레이터</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @keyframes wave {
            0%, 100% { height: 10%; }
            50% { height: 100%; }
        }
        .wave-bar {
            animation: wave 1.2s ease-in-out infinite;
            transform-origin: bottom;
        }
        .wave-bar:nth-child(2) { animation-delay: 0.1s; }
        .wave-bar:nth-child(3) { animation-delay: 0.2s; }
        .wave-bar:nth-child(4) { animation-delay: 0.3s; }
        .wave-bar:nth-child(5) { animation-delay: 0.4s; }
        .wave-bar:nth-child(6) { animation-delay: 0.5s; }
        .wave-bar:nth-child(7) { animation-delay: 0.6s; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen p-4 md:p-8">
<a href="../../index.html" title="홈으로" style="position:fixed;left:12px;bottom:12px;z-index:99999;background:rgba(255,255,255,.94);color:#1c2733;text-decoration:none;padding:8px 13px;border-radius:9px;font:600 14px/1 'Segoe UI','Malgun Gothic',sans-serif;box-shadow:0 2px 10px rgba(0,0,0,.22);border:1px solid rgba(0,0,0,.12)">🏠 홈</a>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- SVG 아이콘 ---
        const RadioIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9"/><path d="M7.8 16.2c-2.3-2.3-2.3-6.1 0-8.5"/><circle cx="12" cy="12" r="2"/><path d="M16.2 7.8c2.3 2.3 2.3 6.1 0 8.5"/><path d="M19.1 4.9C23 8.8 23 15.2 19.1 19.1"/></svg>;
        const AtomIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .11 1.89l1.8 2.6a2 2 0 0 1-3.28 2.28l-2.6-1.8a1.65 1.65 0 0 0-1.89.11 8 8 0 0 1-9.91-9.91 1.65 1.65 0 0 0-.11-1.89l-1.8-2.6a2 2 0 0 1 3.28-2.28l2.6 1.8a1.65 1.65 0 0 0 1.89-.11 8 8 0 0 1 9.91 9.91z"/></svg>;
        const BookIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>;
        const ActivityIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>;
        const CheckIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="text-green-500"><polyline points="20 6 9 17 4 12"/></svg>;
        const PlayIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>;
        const ShieldAlertIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
        const MaximizeIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>;
        const MinimizeIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"></path></svg>;
        const TranslateIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/></svg>;

        // --- 원소 주기율표 1~20번 마스터 데이터 ---
        const PERIODIC_TABLE = [
            { num: 1, sym: 'H', ko: '수소', en: 'hydrogen' }, { num: 2, sym: 'He', ko: '헬륨', en: 'helium' },
            { num: 3, sym: 'Li', ko: '리튬', en: 'lithium' }, { num: 4, sym: 'Be', ko: '베릴륨', en: 'beryllium' },
            { num: 5, sym: 'B', ko: '붕소', en: 'boron' }, { num: 6, sym: 'C', ko: '탄소', en: 'carbon' },
            { num: 7, sym: 'N', ko: '질소', en: 'nitrogen' }, { num: 8, sym: 'O', ko: '산소', en: 'oxygen' }, 
            { num: 9, sym: 'F', ko: '플루오린', en: 'fluorine' }, { num: 10, sym: 'Ne', ko: '네온', en: 'neon' }, 
            { num: 11, sym: 'Na', ko: '나트륨', en: 'sodium' }, { num: 12, sym: 'Mg', ko: '마그네슘', en: 'magnesium' }, 
            { num: 13, sym: 'Al', ko: '알루미늄', en: 'aluminum' }, { num: 14, sym: 'Si', ko: '규소', en: 'silicon' }, 
            { num: 15, sym: 'P', ko: '인', en: 'phosphorus' }, { num: 16, sym: 'S', ko: '황', en: 'sulfur' }, 
            { num: 17, sym: 'Cl', ko: '염소', en: 'chlorine' }, { num: 18, sym: 'Ar', ko: '아르곤', en: 'argon' }, 
            { num: 19, sym: 'K', ko: '칼륨', en: 'potassium' }, { num: 20, sym: 'Ca', ko: '칼슘', en: 'calcium' }
        ];

        // UI 컬러 프리셋
        const COLORS = ["from-blue-500 to-cyan-400", "from-yellow-500 to-orange-400", "from-purple-500 to-pink-400", "from-teal-500 to-emerald-400"];

        // --- 오디오 신서사이저 (Web Audio API) ---
        const playAlienSound = (chords) => {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return; // 브라우저 미지원 시 패스
            const ctx = new AudioContext();
            
            chords.forEach(freq => {
                const osc = ctx.createOscillator();
                const gainNode = ctx.createGain();
                
                osc.type = 'sine'; // 순음(Sine wave)
                osc.frequency.setValueAtTime(freq, ctx.currentTime);
                
                // 클릭음 방지를 위한 Volume Envelope
                gainNode.gain.setValueAtTime(0, ctx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.15, ctx.currentTime + 0.1); // 서서히 커짐
                gainNode.gain.linearRampToValueAtTime(0, ctx.currentTime + 1.5); // 1.5초 후 0으로 서서히 감소
                
                osc.connect(gainNode);
                gainNode.connect(ctx.destination);
                
                osc.start();
                osc.stop(ctx.currentTime + 1.5);
            });
        };

        function App() {
            // 다국어 상태 및 변환 함수
            const [lang, setLang] = useState('ko');
            const t = (ko, en) => lang === 'ko' ? ko : en;

            // 전체화면 상태
            const [isFullscreen, setIsFullscreen] = useState(false);
            const containerRef = useRef(null);

            // 앱 상태: 'LEARN' (해독 학습), 'TEST_INTRO' (테스트 안내), 'TEST' (평가), 'FINISH' (완료)
            const [phase, setPhase] = useState('LEARN');
            const [levels, setLevels] = useState([]);
            const [currentLevelIdx, setCurrentLevelIdx] = useState(0);
            
            // 학습 모드 상태
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [analyzed, setAnalyzed] = useState(false);
            const [userInput, setUserInput] = useState('');
            const [dictionary, setDictionary] = useState([]);
            const [message, setMessage] = useState('');

            // 테스트 모드 상태
            const [testQuestions, setTestQuestions] = useState([]);
            const [currentTestIdx, setCurrentTestIdx] = useState(0);
            const [testFeedback, setTestFeedback] = useState(null);
            const [score, setScore] = useState(0);

            // 전체화면 이벤트 리스너
            useEffect(() => {
                const onFullscreenChange = () => {
                    setIsFullscreen(!!document.fullscreenElement);
                };
                document.addEventListener('fullscreenchange', onFullscreenChange);
                return () => document.removeEventListener('fullscreenchange', onFullscreenChange);
            }, []);

            const toggleFullscreen = () => {
                if (!document.fullscreenElement) {
                    containerRef.current?.requestFullscreen().catch(err => {
                        console.error(`Fullscreen Error: ${err.message}`);
                    });
                } else {
                    document.exitFullscreen();
                }
            };

            const toggleLanguage = () => {
                setLang(prev => prev === 'ko' ? 'en' : 'ko');
            };

            // 초기화: 랜덤 4개 원소 추출하여 레벨 생성
            useEffect(() => {
                const uniqueElements = PERIODIC_TABLE.filter((v, i, a) => a.findIndex(t => (t.num === v.num)) === i);
                const shuffled = [...uniqueElements].sort(() => 0.5 - Math.random());
                const selectedElements = shuffled.slice(0, 4); 

                const generatedLevels = selectedElements.map((el, index) => {
                    const baseFreq = 300 + (el.num * 25);
                    const chords = [baseFreq, Math.round(baseFreq * 1.5)]; 
                    if (el.num > 5) chords.push(Math.round(baseFreq * 2)); 

                    return {
                        id: el.num,
                        clueText: {
                            ko: `외계인이 화면에 [양성자 ${el.num}개, 전자 ${el.num}개]를 가진 원자 모형을 띄우고 아래의 소리를 냈습니다.`,
                            en: `The alien displayed an atom model with [${el.num} protons, ${el.num} electrons] and played the sound below.`
                        },
                        atomData: { protons: el.num, electrons: el.num, symbol: el.sym },
                        alienSound: { chords: chords, color: COLORS[index % COLORS.length] },
                        expectedAnswer: [el.ko, el.en, el.num.toString(), el.sym],
                        element: el
                    };
                });
                setLevels(generatedLevels);
            }, []);

            const currentLevel = levels[currentLevelIdx];

            // ---------------- [학습 모드 함수] ----------------
            const handleAnalyze = () => {
                setIsAnalyzing(true);
                setMessage('');
                
                playAlienSound(currentLevel.alienSound.chords);
                
                setTimeout(() => {
                    setIsAnalyzing(false);
                    setAnalyzed(true);
                }, 1500);
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!userInput.trim()) return;

                const isCorrect = currentLevel.expectedAnswer.some(ans => 
                    ans && userInput.toLowerCase().replace(/\s/g, '') === String(ans).toLowerCase()
                );

                if (isCorrect) {
                    const newDict = [...dictionary, {
                        ...currentLevel,
                        meaning: { ko: currentLevel.element.ko, en: currentLevel.element.en }
                    }];
                    setDictionary(newDict);
                    setUserInput('');
                    setAnalyzed(false);
                    setMessage(t('해독 성공! 사전에 단어가 추가되었습니다.', 'Decoding successful! Word added to dictionary.'));
                    
                    setTimeout(() => {
                        setMessage('');
                        if (currentLevelIdx + 1 >= levels.length) {
                            prepareTest(newDict);
                        } else {
                            setCurrentLevelIdx(prev => prev + 1);
                        }
                    }, 2000);
                } else {
                    setMessage(t(`의미가 일치하지 않습니다. (힌트: 양성자가 ${currentLevel.atomData.protons}개인 원소의 이름이나 기호)`, `Meaning mismatch. (Hint: Element name or symbol with ${currentLevel.atomData.protons} protons)`));
                }
            };

            // ---------------- [테스트 모드 함수] ----------------
            const prepareTest = (dict) => {
                const questions = dict.map(item => {
                    const options = [...dict].sort(() => 0.5 - Math.random());
                    return { target: item, options };
                }).sort(() => 0.5 - Math.random());
                
                setTestQuestions(questions);
                setPhase('TEST_INTRO');
            };

            const handleTestAnswer = (selectedItem) => {
                const isCorrect = selectedItem.id === testQuestions[currentTestIdx].target.id;
                
                if (isCorrect) {
                    setScore(prev => prev + 1);
                    setTestFeedback({ correct: true, msg: t('정답입니다! 주파수의 의미를 정확히 기억했군요.', 'Correct! You accurately remembered the meaning of the frequency.') });
                } else {
                    setTestFeedback({ 
                        correct: false, 
                        msg: t(`오답입니다. 정답은 ${testQuestions[currentTestIdx].target.element.ko}(${testQuestions[currentTestIdx].target.element.sym}) 였습니다.`, `Incorrect. The answer was ${testQuestions[currentTestIdx].target.element.en}(${testQuestions[currentTestIdx].target.element.sym}).`) 
                    });
                }

                setTimeout(() => {
                    setTestFeedback(null);
                    if (currentTestIdx + 1 >= testQuestions.length) {
                        setPhase('FINISH');
                    } else {
                        setCurrentTestIdx(prev => prev + 1);
                    }
                }, 2000);
            };

            // ---------------- [렌더링] ----------------
            if (levels.length === 0) return <div className="p-8 text-center text-slate-400">{t('외계어 데이터를 불러오는 중...', 'Loading alien language data...')}</div>;

            return (
                <div ref={containerRef} className={`bg-slate-900 text-slate-100 font-sans min-h-screen ${isFullscreen ? 'p-6 md:p-10 overflow-y-auto' : ''}`}>
                    <div className="max-w-6xl mx-auto space-y-6">
                        <header className="border-b border-slate-700 pb-4 flex flex-col md:flex-row md:items-start justify-between gap-4">
                            <div>
                                <h1 className="text-3xl font-bold text-teal-400 flex items-center gap-3">
                                    <RadioIcon /> {t('외계어 통신 해독 시뮬레이터', 'Alien Comm Decoding Simulator')}
                                </h1>
                                <p className="text-slate-400 mt-2 text-sm md:text-base">
                                    {t('보편적인 물리/화학적 사실을 바탕으로 외계 종족의 화음(Chord) 언어를 분석하고, 평가를 통해 외계어를 마스터해보세요.', 'Analyze alien chord language based on universal physics/chemistry facts, and master it through evaluations.')}
                                </p>
                            </div>
                            <div className="flex gap-2 shrink-0">
                                <button onClick={toggleLanguage} className="flex items-center gap-2 px-3 py-2 bg-slate-800 hover:bg-slate-700 rounded-lg text-slate-300 transition-colors font-bold text-sm">
                                    <TranslateIcon className="w-5 h-5"/> {lang === 'ko' ? 'EN' : 'KO'}
                                </button>
                                <button onClick={toggleFullscreen} className="p-2 bg-slate-800 hover:bg-slate-700 rounded-lg text-slate-300 transition-colors" title={t('전체 화면', 'Fullscreen')}>
                                    {isFullscreen ? <MinimizeIcon className="w-6 h-6" /> : <MaximizeIcon className="w-6 h-6" />}
                                </button>
                            </div>
                        </header>

                        {/* =========== 학습 모드 (LEARN) =========== */}
                        {phase === 'LEARN' && (
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                {/* 패널 1: 보편적 과학 기준점 */}
                                <div className="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg flex flex-col">
                                    <h2 className="text-lg font-semibold mb-4 text-blue-300 flex items-center gap-2">
                                        <AtomIcon /> {t('과학적 시각 데이터', 'Scientific Visual Data')}
                                        <span className="ml-auto text-xs bg-slate-700 px-2 py-1 rounded text-slate-300">
                                            {t('단어', 'Word')} {currentLevelIdx + 1}/{levels.length}
                                        </span>
                                    </h2>
                                    <div className="flex-1 flex flex-col items-center justify-center bg-slate-900 rounded-lg p-4 border border-slate-700">
                                        <p className="text-sm text-slate-400 mb-6 text-center leading-relaxed">
                                            {t(currentLevel.clueText.ko, currentLevel.clueText.en)}
                                        </p>
                                        <div className="relative w-32 h-32 border-2 border-dashed border-slate-600 rounded-full flex items-center justify-center mb-4">
                                            <div className="flex flex-wrap items-center justify-center w-12 h-12">
                                                {Array.from({ length: currentLevel.atomData.protons }).map((_, i) => (
                                                    <div key={i} className="w-2.5 h-2.5 bg-red-500 rounded-full m-[1px] shadow-[0_0_5px_rgba(239,68,68,0.8)]"></div>
                                                ))}
                                            </div>
                                            <div className="absolute w-full h-full border border-blue-500/30 rounded-full animate-[spin_4s_linear_infinite]">
                                                <div className="w-2 h-2 bg-blue-400 rounded-full absolute -top-1 left-1/2 shadow-[0_0_8px_rgba(96,165,250,0.8)]"></div>
                                            </div>
                                        </div>
                                        <div className="text-center text-slate-300 flex items-center gap-2">
                                            <p>{t('양성자(원자번호): ', 'Protons (Atomic No.): ')} <span className="text-red-400 font-bold text-lg">{currentLevel.atomData.protons}</span></p>
                                        </div>
                                    </div>
                                </div>

                                {/* 패널 2: 음향 분석기 */}
                                <div className="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg flex flex-col">
                                    <h2 className="text-lg font-semibold mb-4 text-teal-300 flex items-center gap-2">
                                        <ActivityIcon /> {t('음향 스펙트로그램', 'Acoustic Spectrogram')}
                                    </h2>
                                    <div className="flex-1 flex flex-col bg-slate-900 rounded-lg border border-slate-700 overflow-hidden relative">
                                        <div className="flex-1 flex items-end justify-center gap-1 p-4 h-32">
                                            {isAnalyzing ? (
                                                Array.from({ length: 7 }).map((_, i) => (
                                                    <div key={i} className={`w-4 bg-gradient-to-t ${currentLevel.alienSound.color} wave-bar rounded-t-sm`}></div>
                                                ))
                                            ) : analyzed ? (
                                                <div className="w-full h-full flex flex-col justify-center items-center gap-2">
                                                    <div className="text-xs text-slate-400 mb-2">{t('푸리에 변환(Fourier Transform) 완료', 'Fourier Transform Complete')}</div>
                                                    {currentLevel.alienSound.chords.map((freq, idx) => (
                                                        <div key={idx} className="w-full flex items-center gap-3 px-4">
                                                            <span className="text-teal-400 font-mono text-sm w-16 text-right">{freq}Hz</span>
                                                            <div className="flex-1 h-2 bg-slate-700 rounded overflow-hidden">
                                                                <div className={`h-full bg-gradient-to-r ${currentLevel.alienSound.color}`} style={{ width: `${(freq/1500)*100}%` }}></div>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            ) : (
                                                <div className="w-full h-1 bg-slate-700 rounded flex items-center justify-center text-xs text-slate-500">{t('대기 중...', 'Waiting...')}</div>
                                            )}
                                        </div>
                                    </div>
                                    <button 
                                        onClick={handleAnalyze}
                                        disabled={isAnalyzing}
                                        className="mt-4 w-full py-3 bg-teal-600 hover:bg-teal-500 disabled:bg-slate-700 text-white font-semibold rounded-lg transition-colors flex justify-center items-center gap-2"
                                    >
                                        {isAnalyzing ? t('소리 재생 및 분석 중...', 'Playing & Analyzing...') : analyzed ? t('소리 다시 듣기', 'Listen Again') : t('외계 소리 수신 및 재생', 'Receive & Play Sound')}
                                    </button>
                                </div>

                                {/* 패널 3: 번역 매트릭스 */}
                                <div className="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg flex flex-col">
                                    <h2 className="text-lg font-semibold mb-4 text-purple-300 flex items-center gap-2">
                                        <BookIcon /> {t('어휘 의미론 매핑', 'Lexical Semantic Mapping')}
                                    </h2>
                                    <div className="flex-1 flex flex-col">
                                        <p className="text-sm text-slate-400 mb-4">
                                            {t('분석된 주파수가 어떤 원소인지 우리말 이름이나 기호(예: C, 산소)로 입력하세요.', 'Enter the element name or symbol (e.g., C, Oxygen) for the analyzed frequency.')}
                                        </p>
                                        <form onSubmit={handleSubmit} className="space-y-4">
                                            <div>
                                                <label className="block text-xs text-slate-500 mb-1">{t('외계어 소리 기호 (기표)', 'Alien Sound Signifier')}</label>
                                                <div className="w-full p-2 bg-slate-900 border border-slate-700 rounded text-teal-400 font-mono text-sm min-h-[42px] flex items-center">
                                                    {analyzed ? `[${currentLevel.alienSound.chords.join(' + ')} Hz]` : t('분석 대기 중...', 'Waiting for analysis...')}
                                                </div>
                                            </div>
                                            <div>
                                                <label className="block text-xs text-slate-500 mb-1">{t('인간 언어의 의미 (기의)', 'Human Language Meaning (Signified)')}</label>
                                                <input 
                                                    type="text" 
                                                    value={userInput}
                                                    onChange={(e) => setUserInput(e.target.value)}
                                                    disabled={!analyzed}
                                                    placeholder={analyzed ? t('정답 입력 후 Enter', 'Type answer and press Enter') : t('먼저 소리를 재생하세요', 'Play the sound first')}
                                                    className="w-full p-3 bg-slate-900 border border-slate-600 rounded text-white focus:outline-none focus:border-purple-500 disabled:opacity-50"
                                                />
                                            </div>
                                            <button 
                                                type="submit" disabled={!analyzed || !userInput}
                                                className="w-full py-3 bg-purple-600 hover:bg-purple-500 disabled:bg-slate-700 text-white font-semibold rounded-lg transition-colors"
                                            >{t('사전 매칭 (의미 연결)', 'Match Dictionary (Link Meaning)')}</button>
                                        </form>
                                        {message && (
                                            <div className={`mt-4 p-3 rounded text-sm font-medium ${message.includes(t('성공', 'successful')) ? 'bg-green-900/30 text-green-400 border border-green-800' : 'bg-red-900/30 text-red-400 border border-red-800'}`}>
                                                {message}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* =========== 테스트 준비 (TEST_INTRO) =========== */}
                        {phase === 'TEST_INTRO' && (
                            <div className="bg-slate-800 p-10 rounded-xl border border-slate-700 text-center shadow-lg">
                                <ShieldAlertIcon className="w-16 h-16 mx-auto text-yellow-400 mb-4" />
                                <h2 className="text-3xl font-bold text-white mb-4">{t('기초 언어 해독 완료!', 'Basic Language Decoding Complete!')}</h2>
                                <p className="text-slate-300 mb-8 max-w-xl mx-auto text-lg">
                                    {t(`훌륭합니다! ${dictionary.length}개의 외계어 단어 사전을 성공적으로 구축했습니다. 이제 외계인의 소리만 듣고 어떤 원소를 뜻하는지 즉각적으로 맞추는 최종 청각 테스트를 진행합니다.`, `Excellent! You have successfully built a dictionary of ${dictionary.length} alien words. Now we proceed to a final auditory test to instantly match alien sounds to elements.`)}
                                </p>
                                <button 
                                    onClick={() => setPhase('TEST')}
                                    className="px-8 py-3 bg-yellow-600 hover:bg-yellow-500 text-white font-bold rounded-lg transition-colors text-lg"
                                >
                                    {t('테스트 시작하기', 'Start Test')}
                                </button>
                            </div>
                        )}

                        {/* =========== 테스트 모드 (TEST) =========== */}
                        {phase === 'TEST' && (
                            <div className="max-w-2xl mx-auto bg-slate-800 p-8 rounded-xl border border-slate-700 shadow-lg">
                                <div className="flex justify-between items-center mb-6 pb-4 border-b border-slate-700">
                                    <h2 className="text-2xl font-bold text-yellow-400">{t('외계어 청각 테스트', 'Alien Language Auditory Test')}</h2>
                                    <span className="text-slate-400 font-mono text-lg">Question {currentTestIdx + 1} / {testQuestions.length}</span>
                                </div>

                                <div className="text-center mb-8">
                                    <p className="text-slate-300 mb-6">{t('스피커에서 들리는 외계인의 소리는 어떤 원소를 의미할까요?', 'What element does the alien sound from the speaker mean?')}</p>
                                    <button 
                                        onClick={() => playAlienSound(testQuestions[currentTestIdx].target.alienSound.chords)}
                                        className="px-6 py-4 bg-teal-600/20 border-2 border-teal-500 hover:bg-teal-600/40 text-teal-300 rounded-full inline-flex items-center gap-3 transition-colors text-lg font-bold"
                                    >
                                        <PlayIcon /> {t('소리 듣기 (재생)', 'Listen (Play)')}
                                    </button>
                                    <p className="text-xs text-slate-500 mt-3">{t('힌트: 1도, 5도 등 주파수의 높낮이(음정)를 기억해보세요.', 'Hint: Remember the pitch (e.g., root, 5th) of the frequencies.')}</p>
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    {testQuestions[currentTestIdx].options.map((opt, idx) => (
                                        <button 
                                            key={idx}
                                            onClick={() => handleTestAnswer(opt)}
                                            disabled={testFeedback !== null}
                                            className="p-4 bg-slate-900 border border-slate-600 hover:border-yellow-400 hover:bg-slate-700 rounded-lg text-white font-semibold flex justify-between items-center transition-colors disabled:opacity-50"
                                        >
                                            <span>{opt.element[lang === 'ko' ? 'ko' : 'en']}</span>
                                            <span className="text-yellow-500 font-mono bg-yellow-900/30 px-2 py-1 rounded text-sm">
                                                {opt.element.sym} ({t('원자번호', 'Atomic No.')} {opt.element.num})
                                            </span>
                                        </button>
                                    ))}
                                </div>

                                {testFeedback && (
                                    <div className={`mt-6 p-4 rounded-lg text-center font-bold text-lg ${testFeedback.correct ? 'bg-green-900/50 text-green-400 border border-green-700' : 'bg-red-900/50 text-red-400 border border-red-700'}`}>
                                        {testFeedback.msg}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* =========== 완료 화면 (FINISH) =========== */}
                        {phase === 'FINISH' && (
                            <div className="bg-slate-800 p-10 rounded-xl border border-slate-700 text-center shadow-lg">
                                <h2 className="text-3xl font-bold text-teal-400 mb-4">{t('시뮬레이션 임무 완수!', 'Simulation Mission Complete!')}</h2>
                                <p className="text-slate-300 mb-6 text-lg">
                                    {lang === 'ko' ? 
                                        <>총 {testQuestions.length}문제 중 <strong className="text-yellow-400 text-2xl mx-2">{score}</strong>문제를 맞추셨습니다.</> : 
                                        <>You got <strong className="text-yellow-400 text-2xl mx-2">{score}</strong> out of {testQuestions.length} questions correct.</>
                                    }
                                </p>
                                <p className="text-slate-400 mb-8 max-w-2xl mx-auto">
                                    {t('우주 보편적인 원자 구조(원자 번호)를 매개체로 삼아, 전혀 다른 발성 구조를 가진 종족 간의 언어 체계를 이해하고 암기하는 데 성공했습니다! 아래에서 구축된 사전을 확인하세요.', 'Using universal atomic structure as a medium, you successfully understood and memorized the language system of a species with a completely different vocal structure! Check your dictionary below.')}
                                </p>
                                <button onClick={() => window.location.reload()} className="px-6 py-2 bg-slate-700 hover:bg-slate-600 rounded text-white transition-colors">{t('새로운 무작위 원소로 다시 시작', 'Restart with new random elements')}</button>
                            </div>
                        )}

                        {/* 하단: 사전 데이터베이스 및 해설 (항상 표시) */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mt-8">
                            <div className="bg-slate-900 p-6 rounded-xl border border-slate-700">
                                <h3 className="text-lg font-bold text-slate-200 mb-4 flex items-center gap-2"><BookIcon /> {t('내 외계어 사전', 'My Alien Dictionary')}</h3>
                                <div className="space-y-2 max-h-64 overflow-y-auto pr-2">
                                    {dictionary.length === 0 ? (
                                        <p className="text-sm text-slate-500 italic">{t('학습을 진행하여 단어를 추가하세요.', 'Proceed with learning to add words.')}</p>
                                    ) : (
                                        dictionary.map((entry, idx) => (
                                            <div key={idx} className="flex items-center justify-between bg-slate-800 p-3 rounded border border-slate-700">
                                                <div className="flex items-center gap-3">
                                                    <div className="w-10 h-10 rounded bg-teal-900/50 border border-teal-800 flex items-center justify-center font-bold text-teal-400">
                                                        {entry.element.sym}
                                                    </div>
                                                    <div>
                                                        <p className="text-white font-semibold">{entry.meaning[lang === 'ko' ? 'ko' : 'en']}</p>
                                                        <p className="text-xs font-mono text-slate-400">{t('원자번호', 'Atomic No.')} {entry.element.num} / [{entry.alienSound.chords.join(' + ')} Hz]</p>
                                                    </div>
                                                </div>
                                                <button 
                                                    onClick={() => playAlienSound(entry.alienSound.chords)}
                                                    className="p-2 hover:bg-slate-700 rounded text-slate-400 hover:text-teal-400 transition-colors"
                                                    title={t('소리 다시 듣기', 'Listen again')}
                                                >
                                                    <PlayIcon />
                                                </button>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>

                            <div className="bg-blue-950/30 p-6 rounded-xl border border-blue-900/50">
                                {lang === 'ko' ? (
                                    <>
                                        <h3 className="text-lg font-bold text-blue-300 mb-3 flex items-center gap-2">적용된 과학 원리 및 객관적 사실</h3>
                                        <div className="text-sm text-slate-300 space-y-3 leading-relaxed">
                                            <p><strong>1. 음향 음성학 (Acoustic Phonetics):</strong> 실제 Web Audio API를 통해 스피커로 출력되는 소리는 복수 개의 '순음(Sine Wave)'이 중첩된 형태입니다. 외계인은 성대 여러 개를 울려 인간의 단어 하나에 해당하는 '화음'을 만듭니다.</p>
                                            <p><strong>2. 원자 구조의 보편성 (Semantics):</strong> 수소가 1번, 칼슘이 20번인 것은 우주 어디서나 변하지 않는 객관적 진리입니다. 이를 바탕으로 자의적인(규칙이 없는) 외계어 소리에 의미(기의)를 부여할 수 있습니다. <em>(참고: IUPAC 주기율표 기준)</em></p>
                                            <p><strong>3. 형성평가 (Formative Assessment):</strong> 학습 직후 이루어지는 청각 테스트는 뇌의 인지 심리학적 메커니즘인 '인출 연습(Retrieval Practice)'을 자극하여 원소기호와 언어적 규칙에 대한 장기 기억력을 대폭 향상시킵니다.</p>
                                        </div>
                                    </>
                                ) : (
                                    <>
                                        <h3 className="text-lg font-bold text-blue-300 mb-3 flex items-center gap-2">Applied Scientific Principles & Objective Facts</h3>
                                        <div className="text-sm text-slate-300 space-y-3 leading-relaxed">
                                            <p><strong>1. Acoustic Phonetics:</strong> The sound output via Web Audio API is a superposition of multiple sine waves. Aliens vibrate multiple vocal cords to create a 'chord' corresponding to a single human word.</p>
                                            <p><strong>2. Universality of Atomic Structure (Semantics):</strong> Hydrogen being 1 and Calcium being 20 are objective truths anywhere in the universe. We can assign meaning (signified) to arbitrary alien sounds based on this. <em>(Ref: IUPAC Periodic Table)</em></p>
                                            <p><strong>3. Formative Assessment:</strong> The auditory test immediately after learning stimulates 'Retrieval Practice', significantly improving long-term memory for element symbols and linguistic rules.</p>
                                        </div>
                                    </>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
