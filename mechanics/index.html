<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>역학 — 물리 시뮬레이션</title>
<style>
  :root { --bg:#f4f6fa; --panel:#fff; --ink:#1c2733; --sub:#5a6b7d; --accent:#1f6fd6; --ok:#1e8f4e; --border:#d7dee8; --radius:12px; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:"Segoe UI","Malgun Gothic",sans-serif; background:var(--bg); color:var(--ink); padding:20px; line-height:1.6; }
  .wrap { max-width:900px; margin:0 auto; }
  .home { display:inline-block; color:var(--sub); text-decoration:none; font-size:0.9em; margin-bottom:14px; }
  .home:hover { color:var(--accent); }
  header h1 { font-size:1.6em; }
  header p { color:var(--sub); margin-top:4px; }
  h2 { font-size:1.15em; margin:26px 0 12px; padding-bottom:6px; border-bottom:2px solid var(--border); }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:14px; }
  .card { background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); padding:16px; text-decoration:none; color:inherit; display:block; transition:transform .1s, box-shadow .1s; }
  .card:hover { transform:translateY(-2px); box-shadow:0 6px 18px rgba(0,0,0,.08); border-color:var(--accent); }
  .card.disabled { opacity:.55; pointer-events:none; }
  .card .icon { font-size:2em; }
  .card .title { font-weight:700; font-size:1.1em; margin:6px 0 2px; }
  .card .desc { color:var(--sub); font-size:0.9em; }
  .badge { display:inline-block; font-size:0.75em; padding:2px 8px; border-radius:20px; margin-top:8px; }
  .badge.done { background:#e3f4ea; color:var(--ok); }
  .badge.wip { background:#fdf1e0; color:#c07c00; }
</style>
</head>
<body>
<div class="wrap">
  <a class="home" href="../index.html">← 홈으로</a>
  <header>
    <h1>⚙️ 역학</h1>
    <p>고등학교 물리 역학 시뮬레이션</p>
  </header>

  <h2>중력가속도(g) 측정</h2>
  <div class="grid">
    <a class="card" href="gravity/free-fall/index.html">
      <div class="icon">🍎</div>
      <div class="title">자유낙하</div>
      <div class="desc">h = ½gt² · 카운트다운 낙하, 반복 측정, 학교 건물 실험(실내/실외 높이 측정), CSV</div>
      <span class="badge done">✔ 완료</span>
    </a>
    <a class="card" href="gravity/pendulum/index.html">
      <div class="icon">🕰</div>
      <div class="title">단진자</div>
      <div class="desc">T = 2π√(L/g) · 최하점 통과 측정, 10주기 반복, 축 선택형 관계 그래프(T²–L, T–√L)</div>
      <span class="badge done">✔ 완료</span>
    </a>
    <a class="card" href="gravity/inclined-plane/index.html">
      <div class="icon">📐</div>
      <div class="title">빗면(경사면)</div>
      <div class="desc">a = g·sinθ · 광센서 게이트로 s–t² 기울기→a, a–sinθ 그래프 기울기→g, 마찰 계통오차, 힘 분해</div>
      <span class="badge done">✔ 완료</span>
    </a>
    <span class="card disabled">
      <div class="icon">🌀</div>
      <div class="title">용수철 진자</div>
      <div class="desc">mg = kx · 정적 평형법</div>
      <span class="badge wip">준비 중</span>
    </span>
  </div>

  <!--
    ── 숨김: 마찰과 운동 (블랙아이스 실험실) ──
    다시 공개하려면 아래 주석을 해제하고 새 <h2>와 카드를 사용하세요.
    <h2>마찰과 운동</h2>
    <div class="grid">
      <a class="card" href="black-ice/index.html">
        <div class="icon">🧊</div>
        <div class="title">블랙아이스 실험실</div>
        <div class="desc">도로 표면별 마찰계수(μ)와 제동거리 d = v²/2μg · 그루빙 실험설계 R&E 가상 실험실</div>
        <span class="badge done">✔ 완료</span>
      </a>
    </div>
  -->
</div>
</body>
</html>
