<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상대성 이론 우주여행 시뮬레이터</title>
    
    <!-- Tailwind CSS (스타일링) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel (브라우저 내 JSX 컴파일) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-900">
<a href="../../index.html" title="홈으로" style="position:fixed;left:12px;bottom:12px;z-index:99999;background:rgba(255,255,255,.94);color:#1c2733;text-decoration:none;padding:8px 13px;border-radius:9px;font:600 14px/1 'Segoe UI','Malgun Gothic',sans-serif;box-shadow:0 2px 10px rgba(0,0,0,.22);border:1px solid rgba(0,0,0,.12)">🏠 홈</a>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 아이콘 컴포넌트 (외부 라이브러리 의존성 제거를 위한 SVG 내장) ---
        const RocketIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"></path>
                <path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"></path>
                <path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"></path>
                <path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"></path>
            </svg>
        );
        const GlobeIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="2" y1="12" x2="22" y2="12"></line>
                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
            </svg>
        );
        const StarIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
            </svg>
        );
        const PlayIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
        );
        const PauseIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <rect x="6" y="4" width="4" height="16"></rect>
                <rect x="14" y="4" width="4" height="16"></rect>
            </svg>
        );
        const RefreshIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                <path d="M3 3v5h5"></path>
            </svg>
        );
        const MaximizeIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
            </svg>
        );
        const MinimizeIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"></path>
            </svg>
        );
        const InfoIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="16" x2="12" y2="12"></line>
                <line x1="12" y1="8" x2="12.01" y2="8"></line>
            </svg>
        );

        // --- 객관적 데이터 및 상수 ---
        const G_TO_LY_Y2 = 1.032; // 1G 가속도를 광년/년^2 단위로 환산

        const DESTINATIONS = [
            { id: 'alpha', name: '알파 센타우리 (가장 가까운 항성계)', distance: 4.37 },
            { id: 'sirius', name: '시리우스 (가장 밝은 별)', distance: 8.6 },
            { id: 'tauceti', name: '타우세티 (프로젝트 헤일메리 목적지)', distance: 11.9 },
            { id: 'kepler', name: '케플러-186f (지구형 외계행성)', distance: 582 },
            { id: 'andromeda', name: '안드로메다 은하', distance: 2537000 }
        ];

        // --- 메인 앱 컴포넌트 ---
        function App() {
            const [destination, setDestination] = useState(DESTINATIONS[2]);
            const [acceleration, setAcceleration] = useState(1.5);
            
            const [results, setResults] = useState({ 
                earthTime: 0, shipTime: 0, maxSpeed: 0, tauHalf: 0, minLength: DESTINATIONS[2].distance 
            });
            
            const [isPlaying, setIsPlaying] = useState(false);
            const [isPaused, setIsPaused] = useState(false);
            const [progress, setProgress] = useState(0);
            const [currentEarthTime, setCurrentEarthTime] = useState(0);
            const [currentShipTime, setCurrentShipTime] = useState(0);
            const [currentContractionRatio, setCurrentContractionRatio] = useState(1);
            const [isFullscreen, setIsFullscreen] = useState(false);
            
            const containerRef = useRef(null);
            const animationRef = useRef(null);
            const lastTimeRef = useRef(0);
            const elapsedRef = useRef(0);

            const calculatePhysics = (distLy, accelG) => {
                if (accelG <= 0) return { earthTime: 0, shipTime: 0, maxSpeed: 0, tauHalf: 0, minLength: distLy };
                
                const a = accelG * G_TO_LY_Y2;
                const d = distLy / 2;
                
                const tauHalf = (1 / a) * Math.acosh(a * d + 1);
                const totalShipTime = tauHalf * 2;
                
                const tHalf = (1 / a) * Math.sinh(a * tauHalf);
                const totalEarthTime = tHalf * 2;
                
                const maxVelocity = Math.tanh(a * tauHalf);
                const maxGamma = Math.cosh(a * tauHalf);
                const minLength = distLy / maxGamma;
                
                return { earthTime: totalEarthTime, shipTime: totalShipTime, maxSpeed: maxVelocity, tauHalf, minLength };
            };

            useEffect(() => {
                const res = calculatePhysics(destination.distance, acceleration);
                setResults(res);
                resetAnimation();
            }, [destination, acceleration]);

            useEffect(() => {
                const onFullscreenChange = () => {
                    setIsFullscreen(!!document.fullscreenElement);
                };
                document.addEventListener('fullscreenchange', onFullscreenChange);
                return () => document.removeEventListener('fullscreenchange', onFullscreenChange);
            }, []);

            const toggleFullscreen = () => {
                if (!document.fullscreenElement) {
                    containerRef.current?.requestFullscreen().catch(err => {
                        console.error(`Fullscreen Error: ${err.message}`);
                    });
                } else {
                    document.exitFullscreen();
                }
            };

            const resetAnimation = () => {
                setIsPlaying(false);
                setIsPaused(false);
                setProgress(0);
                setCurrentEarthTime(0);
                setCurrentShipTime(0);
                setCurrentContractionRatio(1);
                elapsedRef.current = 0;
                lastTimeRef.current = 0;
                cancelAnimationFrame(animationRef.current);
            };

            const pauseAnimation = () => {
                setIsPlaying(false);
                setIsPaused(true);
                lastTimeRef.current = 0;
                cancelAnimationFrame(animationRef.current);
            };

            const startAnimation = () => {
                if (isPlaying) return;
                if (progress >= 1) resetAnimation();
                
                setIsPlaying(true);
                setIsPaused(false);
                const duration = 5000;

                const animate = (timestamp) => {
                    if (!lastTimeRef.current) lastTimeRef.current = timestamp;
                    const deltaTime = timestamp - lastTimeRef.current;
                    lastTimeRef.current = timestamp;
                    
                    elapsedRef.current += deltaTime;
                    let p = elapsedRef.current / duration;
                    
                    if (p >= 1) {
                        p = 1;
                        setIsPlaying(false);
                        setIsPaused(false);
                    }
                    
                    setProgress(p);
                    setCurrentEarthTime(p * results.earthTime);
                    setCurrentShipTime(p * results.shipTime);
                    
                    const a = acceleration * G_TO_LY_Y2;
                    const p_symmetric = p <= 0.5 ? p * 2 : (1 - p) * 2;
                    const currentTau = p_symmetric * results.tauHalf;
                    const currentGamma = Math.cosh(a * currentTau);
                    setCurrentContractionRatio(1 / currentGamma);
                    
                    if (p < 1) {
                        animationRef.current = requestAnimationFrame(animate);
                    }
                };
                
                animationRef.current = requestAnimationFrame(animate);
            };

            return (
                <div ref={containerRef} className={`min-h-screen bg-slate-900 text-slate-100 font-sans ${isFullscreen ? 'p-8 overflow-y-auto' : 'p-4 md:p-8'}`}>
                    <div className="max-w-5xl mx-auto space-y-6">
                        <header className="border-b border-slate-700 pb-4 flex justify-between items-start">
                            <div>
                                <h1 className="text-3xl md:text-4xl font-bold text-blue-400 flex items-center gap-3">
                                    <RocketIcon className="w-8 h-8" />
                                    상대성 이론 우주여행 시뮬레이터
                                </h1>
                                <p className="text-slate-400 mt-2 text-sm md:text-base">
                                    우주선이 빛의 속도에 가깝게 가속할 때 발생하는 '시간 지연' 및 '길이 수축' 현상을 직접 체험해보세요.
                                </p>
                            </div>
                            <button onClick={toggleFullscreen} className="p-2 bg-slate-800 hover:bg-slate-700 rounded-lg text-slate-300 transition-colors">
                                {isFullscreen ? <MinimizeIcon className="w-6 h-6" /> : <MaximizeIcon className="w-6 h-6" />}
                            </button>
                        </header>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            {/* 설정 패널 */}
                            <div className="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg col-span-1">
                                <h2 className="text-xl font-semibold mb-4 text-blue-300">비행 설정</h2>
                                <div className="space-y-5">
                                    <div>
                                        <label className="block text-sm font-medium text-slate-300 mb-2">목적지 (항성계)</label>
                                        <select 
                                            className="w-full bg-slate-900 border border-slate-600 rounded p-2 text-white focus:outline-none focus:border-blue-500"
                                            value={destination.id}
                                            onChange={(e) => setDestination(DESTINATIONS.find(d => d.id === e.target.value))}
                                            disabled={isPlaying}
                                        >
                                            {DESTINATIONS.map(dest => (
                                                <option key={dest.id} value={dest.id}>
                                                    {dest.name} ({dest.distance.toLocaleString()} 광년)
                                                </option>
                                            ))}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-slate-300 mb-2">
                                            우주선 가속도: <span className="text-yellow-400 font-bold">{acceleration} G</span>
                                        </label>
                                        <input 
                                            type="range" min="0.1" max="10" step="0.1" 
                                            value={acceleration}
                                            onChange={(e) => setAcceleration(parseFloat(e.target.value))}
                                            className="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-blue-500"
                                            disabled={isPlaying}
                                        />
                                        <p className="text-xs text-slate-400 mt-1">* 1G = 지구 중력. 소설 '헤일메리'는 1.5G 설정</p>
                                    </div>
                                    <div className="pt-4 border-t border-slate-700 space-y-4">
                                        <div>
                                            <p className="text-sm text-slate-300 mb-1">예상 최고 속도:</p>
                                            <p className="text-2xl font-mono text-purple-400">
                                                {results.maxSpeed.toFixed(4)} <span className="text-lg">c</span>
                                            </p>
                                        </div>
                                        <div>
                                            <p className="text-sm text-slate-300 mb-1">최대 길이 수축:</p>
                                            <p className="text-xl font-mono text-teal-400">
                                                {results.minLength ? results.minLength.toFixed(4) : destination.distance} <span className="text-base text-slate-400">광년</span>
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* 시각화 패널 */}
                            <div className="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg col-span-1 md:col-span-2 flex flex-col">
                                <h2 className="text-xl font-semibold mb-4 text-blue-300 flex items-center justify-between">
                                    시각화 보드
                                    <span className="text-sm font-normal text-slate-400">
                                        현재 거리 수축률: {(currentContractionRatio * 100).toFixed(1)}%
                                    </span>
                                </h2>
                                
                                <div className="space-y-4">
                                    {/* 정지계 */}
                                    <div className="bg-slate-950/50 rounded-lg p-3 border border-slate-700">
                                        <div className="text-xs text-slate-400 mb-2">정지계 (지구 관측자): 거리는 일정하게 유지됨</div>
                                        <div className="relative w-full h-16 bg-slate-950 rounded border border-slate-800 overflow-hidden flex items-center px-4">
                                            <GlobeIcon className="w-6 h-6 text-blue-400 z-10 shrink-0" />
                                            <div className="flex-1 border-t-2 border-slate-600 mx-2 z-0 relative">
                                                <div className="absolute top-1/2 -translate-y-1/2 -ml-3 z-20 text-white" style={{ left: `${progress * 100}%` }}>
                                                    <RocketIcon className="w-5 h-5 text-blue-300 transform rotate-90" />
                                                </div>
                                            </div>
                                            <StarIcon className="w-6 h-6 text-yellow-200 z-10 shrink-0" />
                                        </div>
                                    </div>

                                    {/* 우주선 계 */}
                                    <div className="bg-slate-950/50 rounded-lg p-3 border border-slate-700">
                                        <div className="flex justify-between items-end mb-2">
                                            <div className="text-xs text-slate-400">우주선 계 (조종사 관측): 공간이 수축되며 목적지가 다가옴</div>
                                            <div className="text-sm font-mono text-teal-400 bg-teal-900/30 px-2 py-0.5 rounded border border-teal-800/50">
                                                체감 거리: {(destination.distance * currentContractionRatio).toFixed(4)} 광년
                                            </div>
                                        </div>
                                        <div className="relative w-full h-16 bg-slate-950 rounded border border-slate-800 overflow-hidden flex items-center px-4">
                                            <div className="relative h-full flex items-center" style={{ width: `${currentContractionRatio * 100}%` }}>
                                                <GlobeIcon className="w-6 h-6 text-blue-400 z-10 shrink-0 absolute left-0 -ml-3" />
                                                <div className="w-full border-t-2 border-dashed border-teal-600 z-0 relative">
                                                    <div className="absolute top-1/2 -translate-y-1/2 -ml-3 z-20 text-white" style={{ left: `${progress * 100}%` }}>
                                                        <RocketIcon className="w-5 h-5 text-yellow-400 transform rotate-90 drop-shadow-[0_0_8px_rgba(250,204,21,0.8)]" />
                                                    </div>
                                                </div>
                                                <StarIcon className="w-6 h-6 text-yellow-200 z-10 shrink-0 absolute right-0 -mr-3" />
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* 컨트롤 버튼 */}
                                <div className="flex justify-center gap-4 mt-6">
                                    {!isPlaying ? (
                                        <button onClick={startAnimation} className="px-6 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-lg font-semibold flex items-center gap-2 transition-colors">
                                            <PlayIcon className="w-5 h-5" /> {progress > 0 && progress < 1 ? '계속' : '비행 시작'}
                                        </button>
                                    ) : (
                                        <button onClick={pauseAnimation} className="px-6 py-2 bg-yellow-600 hover:bg-yellow-500 text-white rounded-lg font-semibold flex items-center gap-2 transition-colors">
                                            <PauseIcon className="w-5 h-5" /> 일시 정지
                                        </button>
                                    )}
                                    <button onClick={resetAnimation} className="px-6 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded-lg font-semibold flex items-center gap-2 transition-colors">
                                        <RefreshIcon className="w-5 h-5" /> 초기화
                                    </button>
                                </div>

                                {/* 시계 비교 영역 */}
                                <div className="grid grid-cols-2 gap-4 mt-8 flex-1">
                                    <div className="bg-slate-900 rounded-lg p-4 text-center border border-blue-900">
                                        <div className="flex justify-center items-center gap-2 text-blue-400 mb-2">
                                            <GlobeIcon className="w-5 h-5" />
                                            <h3 className="font-semibold">지구의 시간</h3>
                                        </div>
                                        <div className="text-3xl md:text-4xl font-mono font-bold text-white mb-1">
                                            {currentEarthTime.toFixed(2)} <span className="text-lg text-slate-400">년</span>
                                        </div>
                                    </div>
                                    <div className="bg-slate-900 rounded-lg p-4 text-center border border-yellow-900">
                                        <div className="flex justify-center items-center gap-2 text-yellow-400 mb-2">
                                            <RocketIcon className="w-5 h-5" />
                                            <h3 className="font-semibold">우주선의 시간</h3>
                                        </div>
                                        <div className="text-3xl md:text-4xl font-mono font-bold text-white mb-1">
                                            {currentShipTime.toFixed(2)} <span className="text-lg text-slate-400">년</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* 해설 패널 */}
                        <div className="bg-blue-950/30 p-6 rounded-xl border border-blue-900/50">
                            <h3 className="text-lg font-bold text-blue-300 flex items-center gap-2 mb-3">
                                <InfoIcon className="w-5 h-5" />
                                과학적 원리 해설 (고등 물리학 I, II 연계)
                            </h3>
                            <div className="text-sm text-slate-300 space-y-3 leading-relaxed">
                                <p><strong>1. 시간 지연 (Time Dilation):</strong> 우주선이 지속적으로 가속하여 빛의 속도(c)에 가까워질수록 상대성 이론에 의해 지구보다 우주선 내부의 시간이 느리게 흐릅니다.</p>
                                <p><strong>2. 길이 수축 (Length Contraction):</strong> 빠르게 이동하는 관찰자에게는 움직이는 방향의 공간이 수축되어 보입니다 (L = L₀ √(1 - v²/c²)). 속도가 빠른 비행 중간 지점에서 공간이 최대로 수축합니다.</p>
                                <p><strong>3. 프로젝트 헤일메리:</strong> 1.5G로 계속 가속하면 조종사(라이랜드 그레이스)는 거리가 엄청나게 수축했다고 체감하므로, 11.9광년 거리도 자신의 수명(약 3.8년) 내에 도달할 수 있습니다.</p>
                                <p><strong>4. 일반 상대성 이론 (등가 원리):</strong> 시간 계산은 특수 상대성 이론으로 도출되지만, 조종사가 1.5G 가속도를 중력처럼 느끼며 걷는 것은 '가속도와 중력은 구분할 수 없다'는 일반 상대성 이론의 등가 원리 때문입니다.</p>
                            </div>
                            <div className="mt-4 pt-4 border-t border-blue-900/50">
                                <h4 className="text-sm font-semibold text-blue-200 mb-2">적용된 상대론적 운동학 공식:</h4>
                                <div className="bg-slate-900/50 p-3 rounded text-xs text-slate-300 font-mono space-y-2">
                                    <p><span className="text-yellow-400">우주선의 고유 시간 (τ):</span> τ = (c/a) · arcosh(a·d/c² + 1)</p>
                                    <p><span className="text-blue-400">지구의 측정 시간 (t):</span> t = (c/a) · sinh(a·τ/c)</p>
                                    <p><span className="text-teal-400">로런츠 인자 (γ):</span> γ = cosh(a·τ/c), <span className="text-teal-400">수축 거리 (L):</span> L = L₀ / γ</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- 앱 렌더링 ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
