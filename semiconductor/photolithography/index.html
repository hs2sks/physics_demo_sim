<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  :root{
    --color-background-primary:#ffffff;
    --color-background-secondary:#f1efe8;
    --color-background-tertiary:#e8e6dd;
    --color-text-primary:#1a1a1a;
    --color-text-secondary:#5f5e5a;
    --color-text-tertiary:#8a8880;
    --color-border-tertiary:rgba(60,60,55,0.15);
    --color-border-secondary:rgba(60,60,55,0.30);
    --border-radius-md:8px;
    --border-radius-lg:12px;
    --font-sans:-apple-system,"Segoe UI","Malgun Gothic",sans-serif;
    --font-mono:"JetBrains Mono","Consolas",monospace;
  }
  body{ font-family:var(--font-sans); background:var(--color-background-secondary); color:var(--color-text-primary); margin:0; padding:16px; }
  .wrap-outer{ max-width:900px; margin:0 auto; }
  h1.page-title{ font-size:1.3rem; margin:4px 0 2px; }
  p.page-sub{ color:var(--color-text-secondary); font-size:.9rem; margin-bottom:8px; }
</style>
</head>
<body>
<a href="../../index.html" title="홈으로" style="position:fixed;left:12px;bottom:12px;z-index:99999;background:rgba(255,255,255,.94);color:#1c2733;text-decoration:none;padding:8px 13px;border-radius:9px;font:600 14px/1 'Segoe UI','Malgun Gothic',sans-serif;box-shadow:0 2px 10px rgba(0,0,0,.22);border:1px solid rgba(0,0,0,.12)">🏠 홈</a>
<div class="wrap-outer">
<h1 class="page-title">🔬 포토리소그래피 공정 7단계</h1>
<p class="page-sub">반도체 회로를 새기는 노광 공정을 단계별로 체험합니다.</p>

<style>
*{box-sizing:border-box;margin:0;padding:0}
.pw{padding:1rem 0}
.prow{display:flex;align-items:center;gap:0;margin-bottom:1.25rem;overflow-x:auto;padding-bottom:4px}
.pd{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--color-border-secondary);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--color-text-tertiary);cursor:pointer;transition:all .2s;flex-shrink:0;background:var(--color-background-primary)}
.pd.on{background:#185FA5;border-color:#185FA5;color:#E6F1FB;font-weight:500}
.pd.dn{background:#E1F5EE;border-color:#1D9E75;color:#085041}
.pl{flex:1;height:1.5px;background:var(--color-border-tertiary);min-width:8px}
.pl.dn{background:#1D9E75}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden}
.ch{padding:.875rem 1.25rem;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;gap:10px}
.sn{font-size:11px;color:var(--color-text-tertiary);white-space:nowrap}
.st{font-size:15px;font-weight:500;color:var(--color-text-primary)}
.tg{font-size:11px;padding:2px 10px;border-radius:20px;margin-left:auto;white-space:nowrap;flex-shrink:0}
.bd{display:grid;grid-template-columns:1fr 1fr;gap:0}
.vp{padding:1rem;border-right:0.5px solid var(--color-border-tertiary);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:240px}
.ip{padding:1.25rem;display:flex;flex-direction:column;gap:.875rem}
.lb{font-size:11px;font-weight:500;color:var(--color-text-tertiary);letter-spacing:.04em;margin-bottom:2px}
.vl{font-size:13px;color:var(--color-text-primary);line-height:1.6}
.mn{font-size:12px;font-family:var(--font-mono);padding:7px 10px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);border-left:3px solid #185FA5;color:var(--color-text-primary);white-space:pre}
.ht{font-size:12px;color:var(--color-text-secondary);line-height:1.55;border-left:3px solid #EF9F27;padding-left:8px}
.sr{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--color-text-secondary)}
.sr input{flex:1}
.sv{min-width:52px;text-align:right;font-family:var(--font-mono);font-size:12px;color:var(--color-text-primary)}
.nav{display:flex;justify-content:space-between;align-items:center;padding:.75rem 1.25rem;border-top:0.5px solid var(--color-border-tertiary)}
.nav button{padding:5px 14px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary);cursor:pointer;font-size:13px}
.nav button:hover{background:var(--color-background-secondary)}
.nav button:disabled{opacity:.3;cursor:default}
.nav .nb{background:#185FA5;border-color:#185FA5;color:#E6F1FB}
.nav .nb:hover{background:#0C447C}
</style>
<h2 class="sr-only">포토리소그래피 공정 7단계 인터랙티브 시뮬레이션 — 세로축 회전, 볼록렌즈, 고정 웨이퍼 식각 포함</h2>
<div class="pw">
<div class="prow" id="prog"></div>
<div class="card">
  <div class="ch"><span class="sn" id="sn"></span><span class="st" id="st"></span><span class="tg" id="stag"></span></div>
  <div class="bd">
    <div class="vp" id="vis"></div>
    <div class="ip" id="info"></div>
  </div>
  <div class="nav">
    <button id="bp" onclick="go(-1)">← 이전</button>
    <span style="font-size:12px;color:var(--color-text-tertiary)" id="nl"></span>
    <button class="nb" id="bn" onclick="go(1)">다음 →</button>
  </div>
</div>
</div>
<script>
const SF='var(--font-sans)';
function t(x,y,s,fill,ta,fs){return`<text x="${x}" y="${y}" font-size="${fs||10}" fill="${fill||'var(--color-text-primary)'}" font-family="${SF}" text-anchor="${ta||'middle'}">${s}</text>`;}

const S=[
{ti:"웨이퍼 세정",tag:{b:"#E1F5EE",c:"#085041",tx:"준비 단계"},
 concept:"표면 오염 제거",formula:"세정액: NH₄OH + H₂O₂ + 물\n(RCA 세정법)",
 easy:"마치 요리 전 도마를 깨끗이 닦는 것처럼,\n실리콘 판(웨이퍼)에 붙은 먼지·기름·이온을\n완전히 제거합니다.\n\n반도체 공장은 수술실보다 1000배 이상\n깨끗한 클린룸에서 이 작업을 합니다.",
 hint:"먼지 1개가 회로를 망가뜨릴 수 있어요.\n머리카락 굵기의 1/1000 크기 입자도 위험합니다.",draw:"clean"},

{ti:"산화막 형성",tag:{b:"#E6F1FB",c:"#0C447C",tx:"절연층"},
 concept:"SiO₂ — 실리콘 이산화물 (산화막)",formula:"Si + O₂ → SiO₂\n(900~1200°C 고온 로에서 반응)",
 easy:"철을 공기에 두면 녹(산화철)이 슬듯,\n실리콘을 고온 산소 속에 넣으면\n표면에 얇은 유리막(SiO₂, 산화막)이 생깁니다.\n\n이 막은 전기를 차단하는 절연체로,\n회로 사이를 전기적으로 분리하는 벽 역할입니다.",
 hint:"슬라이더로 산화막 두께를 바꿔보세요.\n두꺼울수록 절연 성능이 높아집니다.",draw:"oxide",slider:{id:"ox",label:"산화막 두께",min:5,max:80,val:25,unit:"nm"}},

{ti:"포토레지스트 도포",tag:{b:"#FAEEDA",c:"#633806",tx:"스핀 코팅"},
 concept:"세로축 회전 + 원심력으로 균일한 막 형성",formula:"두께 ∝ √점도 / 회전속도\n→ 빨리 돌릴수록 얇아짐",
 easy:"웨이퍼 중심을 지나는 세로축(스핀들)을 기준으로\n고속 회전하면, 가운데 떨어뜨린 감광액(PR)이\n원심력으로 바깥으로 퍼지며 얇은 막이 됩니다.\n\n회전이 빠를수록 원심력이 커져\nPR이 더 멀리, 더 얇게 퍼집니다.",
 hint:"슬라이더로 rpm을 바꿔보세요.\n세로축을 중심으로 회전하는 모습을 확인하세요.",draw:"spin",slider:{id:"rpm",label:"회전 속도",min:500,max:4000,val:2000,unit:"rpm",step:100}},

{ti:"노광 (빛 쬐기)",tag:{b:"#FAECE7",c:"#712B13",tx:"핵심 단계 ★"},
 concept:"빛의 파동성 — 파장이 짧을수록 더 미세한 패턴",formula:"최소 선폭 R = k·λ / NA\n→ 파장(λ) 짧을수록 더 가는 선 가능",
 easy:"① UV 광원에서 빛이 내려옵니다.\n② 마스크(회로 패턴이 새겨진 판)를 통과해\n   패턴 모양대로만 빛이 선택적으로 지나갑니다.\n③ 볼록렌즈(투영 광학계)가 그 패턴을\n   4~5배 작게 줄여 감광액에 새겨 넣습니다.\n\n파장이 짧을수록 더 가는 선을 만들 수 있어요.",
 hint:"파장 슬라이더를 움직여 최소 선폭 변화를 확인하세요.\n볼록렌즈가 빛을 좁혀 패턴을 축소합니다.",draw:"expose",slider:{id:"wl",label:"빛의 파장 λ",min:13,max:436,val:193,unit:"nm",step:1}},

{ti:"현상 (패턴 드러내기)",tag:{b:"#E1F5EE",c:"#085041",tx:"화학 반응"},
 concept:"빛 에너지(E=hf)가 화학 결합을 끊음",formula:"E = hf = hc/λ\n(파장 짧을수록 광자 에너지 큼)",
 easy:"사진 필름을 현상하듯,\n현상액을 부으면 빛을 받아 변한 부분이\n씻겨나가 패턴이 드러납니다.\n\n양성(+) PR: 빛 받은 곳 → 제거\n음성(−) PR: 빛 받은 곳 → 경화·남음\n\n빛 에너지(E=hf)가 분자 결합을 끊어\n이 과정이 가능합니다.",
 hint:"버튼을 눌러 현상 과정을 단계별로 확인하세요.",draw:"develop"},

{ti:"식각 (파내기)",tag:{b:"#EEEDFE",c:"#3C3489",tx:"패턴 전사"},
 concept:"플라즈마 건식 식각 — 이온만 수직으로 이동",formula:"건식 식각: 이온이 수직으로 충돌\n→ PR이 없는 곳만 아래 방향으로 제거",
 easy:"웨이퍼는 고정되어 있고,\n플라즈마 이온이 위에서 수직으로 내려옵니다.\n\nPR이 있는 곳: 이온이 PR에 막혀 재료 보호\nPR이 없는 곳: 이온이 충돌 → 재료 제거\n\n수직 방향으로만 파내기 때문에 옆면이 깨끗해\n나노미터 수준의 정밀한 홈을 만들 수 있습니다.",
 hint:"웨이퍼는 절대 움직이지 않아요.\n이온만 위에서 내려옵니다. 슬라이더로 깊이를 조절해보세요.",draw:"etch",slider:{id:"ed",label:"식각 깊이",min:5,max:55,val:20,unit:"nm",step:5}},

{ti:"포토레지스트 제거",tag:{b:"#EAF3DE",c:"#27500A",tx:"공정 완료"},
 concept:"7단계 반복 → 수십억 개 트랜지스터",formula:"O₂ 플라즈마 애싱 또는 유기 용제\n→ PR 완전 제거 후 최종 구조 확인",
 easy:"임무를 다한 감광막을 산소 플라즈마나\n용제로 완전히 제거하면,\n원하는 회로 패턴이 새겨진 칩이 완성됩니다.\n\n이 7단계를 수십~수백 번 반복하면\n엄지손톱 크기 칩 안에 수십억 개의\n트랜지스터가 만들어집니다!",
 hint:"이 7단계가 반복되어 스마트폰 칩,\nPC CPU, 메모리가 탄생합니다.",draw:"final"}
];

let cur=0,devSt=0;

function drawClean(el){
  el.innerHTML=`<svg width="220" height="185" viewBox="0 0 220 185">
  <defs><linearGradient id="cgS" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#85B7EB"/><stop offset="100%" stop-color="#378ADD"/></linearGradient></defs>
  <rect x="20" y="122" width="180" height="40" rx="6" fill="url(#cgS)"/>
  <rect x="20" y="122" width="180" height="40" rx="6" fill="none" stroke="#185FA5" stroke-width="0.5"/>
  ${t(110,146,'Si 웨이퍼','#E6F1FB','middle',12)}
  <rect x="28" y="115" width="164" height="8" rx="2" fill="#F09595" opacity="0.5"/>
  ${t(110,110,'오염물 (유기물·이온)','var(--color-text-secondary)','middle',9)}
  ${[42,65,88,112,136,158,180].map((x,i)=>`<circle cx="${x}" cy="${97-(i%3)*11}" r="3.5" fill="none" stroke="#1D9E75" stroke-width="1"><animate attributeName="cy" values="${97-(i%3)*11};${60-(i%2)*10};${97-(i%3)*11}" dur="${1.1+i*0.15}s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0;0.8" dur="${1.1+i*0.15}s" repeatCount="indefinite"/></circle>`).join('')}
  ${t(110,28,'세정액 분자가 오염물을 들어올림','#0F6E56','middle',10)}
  </svg>`;}

function drawOxide(el,v){v=v||25;const oh=Math.round(v*0.55+6);
  el.innerHTML=`<svg width="220" height="195" viewBox="0 0 220 195">
  <defs><linearGradient id="ogS" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#85B7EB"/><stop offset="100%" stop-color="#378ADD"/></linearGradient>
  <linearGradient id="ogO" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#B5D4F4"/><stop offset="100%" stop-color="#85B7EB"/></linearGradient></defs>
  ${t(110,13,'고온로 (900~1200°C)','var(--color-text-tertiary)','middle',9)}
  ${[45,75,105,135,165].map((x,i)=>`<path d="M${x} 20 Q${x+5} 30 ${x} 40 Q${x+5} 50 ${x} 60" fill="none" stroke="#EF9F27" stroke-width="1.2" opacity="0.5"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="${0.8+i*0.1}s" repeatCount="indefinite"/></path>`).join('')}
  <rect x="20" y="${128-oh}" width="180" height="${oh}" rx="4" fill="url(#ogO)"/>
  <rect x="20" y="${128-oh}" width="180" height="${oh}" rx="4" fill="none" stroke="#185FA5" stroke-width="0.5"/>
  ${t(110,128-oh/2+4,`SiO₂ 산화막 (${v}nm)`,'#0C447C','middle',10)}
  <rect x="20" y="128" width="180" height="45" rx="4" fill="url(#ogS)"/>
  ${t(110,155,'Si 웨이퍼','#E6F1FB','middle',12)}
  <line x1="204" y1="${128-oh}" x2="214" y2="${128-oh}" stroke="#185FA5" stroke-width="0.5"/>
  <line x1="204" y1="128" x2="214" y2="128" stroke="#185FA5" stroke-width="0.5"/>
  <line x1="209" y1="${128-oh}" x2="209" y2="128" stroke="#185FA5" stroke-width="0.5"/>
  ${t(215,128-oh/2+4,`${v}nm`,'#185FA5','start',8)}
  </svg>`;}

function drawSpin(el,v){
  v=v||2000;
  const thick=Math.max(40,Math.round(3100-v*0.55));
  const dur=(2.0-(v/4000)*1.2).toFixed(1);
  const prRx=Math.round(22+(v/4000)*60);
  const prRy=Math.max(3,Math.round(11-(v/4000)*8));
  el.innerHTML=`<svg width="220" height="200" viewBox="0 0 220 200">
  <defs><marker id="mSp" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#185FA5" stroke-width="1.5"/></marker>
  <linearGradient id="spSi" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#85B7EB"/><stop offset="100%" stop-color="#378ADD"/></linearGradient></defs>
  ${t(110,11,'▲ 세로축 (회전축 = 스핀들)','var(--color-text-tertiary)','middle',9)}
  <line x1="110" y1="14" x2="110" y2="100" stroke="#5F5E5A" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 40 134 Q 25 118 40 103" fill="none" stroke="#185FA5" stroke-width="1.5" marker-end="url(#mSp)"/>
  <path d="M 180 103 Q 195 118 180 134" fill="none" stroke="#185FA5" stroke-width="1.5" marker-end="url(#mSp)"/>
  <ellipse cx="110" cy="123" ry="13" fill="url(#spSi)" stroke="#185FA5" stroke-width="0.5"><animate attributeName="rx" values="82;0;82" dur="${dur}s" repeatCount="indefinite"/></ellipse>
  <ellipse cx="110" cy="111" ry="6" fill="#B5D4F4" stroke="#85B7EB" stroke-width="0.5"><animate attributeName="rx" values="82;0;82" dur="${dur}s" repeatCount="indefinite"/></ellipse>
  <ellipse cx="110" cy="104" ry="${prRy}" fill="#EF9F27" stroke="#BA7517" stroke-width="0.5" opacity="0.9"><animate attributeName="rx" values="${prRx};0;${prRx}" dur="${dur}s" repeatCount="indefinite"/></ellipse>
  <line x1="110" y1="136" x2="110" y2="144" stroke="#5F5E5A" stroke-width="2.5"/>
  <rect x="92" y="144" width="36" height="14" rx="3" fill="#B4B2A9" stroke="#888780" stroke-width="0.5"/>
  ${t(110,154,'척 (Chuck)','#444441','middle',8)}
  <line x1="35" y1="117" x2="19" y2="117" stroke="#EF9F27" stroke-width="1.5"/><polygon points="19,114 12,117 19,120" fill="#EF9F27"/>
  <line x1="185" y1="117" x2="201" y2="117" stroke="#EF9F27" stroke-width="1.5"/><polygon points="201,114 208,117 201,120" fill="#EF9F27"/>
  ${t(8,128,'원심력','#854F0B','start',8)}
  ${t(196,106,'PR','#633806','start',8)}
  ${t(196,114,'SiO₂','#0C447C','start',8)}
  ${t(196,125,'Si','#1D3E6E','start',8)}
  ${t(110,173,`${v.toLocaleString()} rpm → 두께 ≈ ${thick}nm`,'var(--color-text-primary)','middle',10)}
  ${t(110,187,'빠를수록 PR이 얇고 균일하게 퍼짐 (원심력 ↑)','var(--color-text-secondary)','middle',9)}
  </svg>`;}

function drawExpose(el,v){
  v=v||193;
  const minW=Math.round(0.61*v/0.85);
  const techL=v<=14?"EUV":v<=200?"ArF UV":v<=250?"KrF UV":"가시광 수준";
  const rc=v<=14?"#1D9E75":v<=200?"#7F77DD":v<=300?"#378ADD":"#D4537E";
  const lc=v<=200?"#CED5FF":"#FEF3C7";
  const yMsk=44,yLns=86,yPR=122;
  const rxs=[54,68,82,96,110,124,138,152,166];
  const slots=[{x1:84,x2:104},{x1:122,x2:142}];
  const crxs=[52,70,90,110,130,150,168];
  const scale=0.50;const cx=110;
  el.innerHTML=`<svg width="220" height="208" viewBox="0 0 220 208">
  <defs><marker id="mEx" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="${rc}" stroke-width="1.5"/></marker></defs>
  <rect x="50" y="4" width="120" height="14" rx="3" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  ${t(110,14,`UV 광원 — λ=${v}nm (${techL})`,'#633806','middle',8.5)}

  ${t(73,yMsk+9,'차단','var(--color-text-tertiary)','middle',7)}
  ${t(113,yMsk+9,'통과','#854F0B','middle',7)}
  ${t(152,yMsk+9,'차단','var(--color-text-tertiary)','middle',7)}
  ${slots.map((s,i)=>`<line x1="${(s.x1+s.x2)/2}" y1="${yMsk+14}" x2="${(s.x1+s.x2)/2}" y2="${yLns}" stroke="${rc}" stroke-width="2.2" opacity="0.9"><animate attributeName="opacity" values="0.9;0.35;0.9" dur="0.8s" begin="${(i*0.1).toFixed(2)}s" repeatCount="indefinite"/></line>`).join('')}
  <path d="M 46 ${yLns} Q 110 ${yLns-20} 174 ${yLns} Q 110 ${yLns+20} 46 ${yLns} Z" fill="${lc}" fill-opacity="0.55" stroke="${rc}" stroke-width="1" opacity="0.9"/>

  <line x1="48" y1="${yLns+12}" x2="${Math.round(cx+(48-cx)*scale)}" y2="${yPR}" stroke="${rc}" stroke-width="1.2" opacity="0.35"/>
  <line x1="172" y1="${yLns+12}" x2="${Math.round(cx+(172-cx)*scale)}" y2="${yPR}" stroke="${rc}" stroke-width="1.2" opacity="0.35"/>
  ${t(110,(yLns+yPR)/2+4,'← 좁아짐 (패턴 축소) →',rc,'middle',8)}
  <rect x="42" y="${yPR}" width="136" height="14" rx="2" fill="#EF9F27" stroke="#BA7517" stroke-width="0.5" opacity="0.9"/>

  <rect x="42" y="${yPR+14}" width="136" height="8" rx="1" fill="#B5D4F4" stroke="#85B7EB" stroke-width="0.5"/>

  <rect x="42" y="${yPR+22}" width="136" height="34" rx="3" fill="#378ADD" stroke="#185FA5" stroke-width="0.5"/>
  ${t(110,yPR+43,'Si 웨이퍼','#E6F1FB','middle',11)}
  ${t(110,188,`λ = ${v}nm → 최소 선폭 ≈ ${minW}nm`,'var(--color-text-primary)','middle',10)}

function drawDevelop(el,_,reset){
  if(reset)devSt=0;
  const pats=[{x:28,w:40},{x:88,w:44},{x:152,w:32}];
  const exp=[{x:68,w:20},{x:132,w:20}];
  el.innerHTML=`<svg width="220" height="195" viewBox="0 0 220 195">
  <defs><linearGradient id="dvS" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#85B7EB"/><stop offset="100%" stop-color="#378ADD"/></linearGradient>
  <marker id="dvA" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#D85A30" stroke-width="1.5"/></marker></defs>
  ${devSt===0?`<rect x="22" y="68" width="176" height="16" rx="2" fill="#EF9F27" opacity="0.9"/>
  ${exp.map(e=>`<rect x="${e.x}" y="68" width="${e.w}" height="16" fill="#F0997B" opacity="0.85"/>`).join('')}
  ${t(110,57,'빛 받은 부분(연한 주황) = 제거될 부분','#633806','middle',9)}`:`
  ${pats.map(p=>`<rect x="${p.x}" y="68" width="${p.w}" height="16" rx="2" fill="#EF9F27" opacity="0.9"/>`).join('')}
  ${devSt===1?exp.map(e=>`<path d="M${e.x+e.w/2} 66 L${e.x+e.w/2} 52" fill="none" stroke="#D85A30" stroke-width="1.5" marker-end="url(#dvA)"/>`).join(''):''}
  ${devSt===1?t(110,47,'노광 부위 씻겨나감','#D85A30','middle',9):''}
  ${devSt===2?t(110,47,'현상 완료 — 패턴 드러남','#0F6E56','middle',10):''}`}
  <rect x="22" y="84" width="176" height="8" rx="1" fill="#B5D4F4" stroke="#85B7EB" stroke-width="0.5"/>
  <rect x="22" y="92" width="176" height="44" rx="4" fill="url(#dvS)"/>
  ${t(110,118,'Si 웨이퍼','#E6F1FB','middle',11)}
  ${t(110,152,'E = hf = hc/λ  (광자 에너지로 결합 끊김)','#0F6E56','middle',9)}
  ${t(110,165,devSt===0?"현상 전 — 패턴이 숨어있음":devSt===1?"현상 중 — 노광 부위 제거 중":"현상 완료 — 패턴 선명하게 드러남",'var(--color-text-primary)','middle',10)}
  </svg>
  <div style="text-align:center;margin-top:8px">
    <button onclick="nxtDev()" style="font-size:12px;padding:4px 14px;border-radius:6px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);cursor:pointer;color:var(--color-text-primary)">${devSt<2?"현상 진행 →":"처음으로 ↺"}</button>
  </div>`;}
window.nxtDev=function(){devSt=(devSt+1)%3;drawDevelop(document.getElementById('vis'));};

function drawEtch(el,v){
  v=v||20;
  const sH=18;
  const ePx=Math.min(sH+16,Math.round(v*0.65));
  const s2e=Math.min(sH,ePx);
  const sie=Math.max(0,ePx-sH);
  const pB=[{x:22,w:40},{x:80,w:54},{x:152,w:42}];
  const gv=[{x:62,w:18},{x:134,w:18}];
  const yPR=48,pH=16,yS2=64,ySi=82,siH=48;
  const ixs=[28,40,52,65,78,91,104,117,130,143,156,169,182];
  function iRow(y1,y2,dly){
    return ixs.map((x,i)=>`<line x1="${x}" y1="${y1}" x2="${x}" y2="${y2}" stroke="#AFA9EC" stroke-width="1.2"><animate attributeName="opacity" values="0.9;0.05;0.9" dur="0.9s" begin="${(dly+i*0.046).toFixed(2)}s" repeatCount="indefinite"/></line><polygon points="${x-2},${y2} ${x+2},${y2} ${x},${y2+5}" fill="#7F77DD"><animate attributeName="opacity" values="0.75;0.05;0.75" dur="0.9s" begin="${(dly+i*0.046).toFixed(2)}s" repeatCount="indefinite"/></polygon>`).join('');
  }
  el.innerHTML=`<svg width="220" height="198" viewBox="0 0 220 198">
  <defs><linearGradient id="etSi" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#85B7EB"/><stop offset="100%" stop-color="#378ADD"/></linearGradient></defs>
  ${t(110,9,'플라즈마 이온만 수직으로 이동 (웨이퍼는 고정!)','#534AB7','middle',8.5)}
  ${iRow(13,23,0)}${iRow(25,35,0.3)}${iRow(37,45,0.6)}
  ${pB.map(p=>`<rect x="${p.x}" y="${yPR}" width="${p.w}" height="${pH}" rx="2" fill="#EF9F27" stroke="#BA7517" stroke-width="0.5"/>`).join('')}
  ${pB.map(p=>t(p.x+p.w/2,yPR+10,'PR (보호)','#633806','middle',7.5)).join('')}
  <rect x="22" y="${yS2}" width="176" height="${sH}" fill="#B5D4F4" stroke="#85B7EB" stroke-width="0.5"/>
  ${gv.map(g=>`<rect x="${g.x}" y="${yS2}" width="${g.w}" height="${s2e}" fill="var(--color-background-primary)"/><rect x="${g.x}" y="${yS2}" width="${g.w}" height="${s2e}" fill="none" stroke="#534AB7" stroke-width="0.6" stroke-dasharray="2 2"/>`).join('')}
  ${t(19,yS2+11,'SiO₂','#0C447C','end',8)}
  <rect x="22" y="${ySi}" width="176" height="${siH}" rx="3" fill="url(#etSi)"/>
  ${sie>0?gv.map(g=>`<rect x="${g.x}" y="${ySi}" width="${g.w}" height="${Math.min(siH-8,sie)}" fill="var(--color-background-primary)"/><rect x="${g.x}" y="${ySi}" width="${g.w}" height="${Math.min(siH-8,sie)}" fill="none" stroke="#3B6D11" stroke-width="0.6" stroke-dasharray="2 2"/>`).join(''):''}
  ${t(110,ySi+30,'Si 웨이퍼 (고정)','#E6F1FB','middle',11)}
  ${t(110,145,`식각 깊이: ${v}nm`,'var(--color-text-primary)','middle',10)}
  ${t(110,159,'PR이 없는 곳만 식각 / 웨이퍼는 고정됨','#534AB7','middle',9)}
  ${t(110,173,'이온이 수직으로 내려옴 = 건식(플라즈마) 식각','var(--color-text-secondary)','middle',9)}
  </svg>`;}

function drawFinal(el){
  const pats=[{x:28,w:40},{x:88,w:44},{x:152,w:32}];
  const ch=[{x:68,w:20},{x:132,w:20}];
  el.innerHTML=`<svg width="220" height="180" viewBox="0 0 220 180">
  <defs><linearGradient id="fnS" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#85B7EB"/><stop offset="100%" stop-color="#378ADD"/></linearGradient>
  <linearGradient id="fnC" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#9FE1CB"/><stop offset="100%" stop-color="#5DCAA5"/></linearGradient>
  <linearGradient id="fnO" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#B5D4F4"/><stop offset="100%" stop-color="#85B7EB"/></linearGradient></defs>
  ${t(110,13,'PR 제거 완료 — 최종 회로 패턴','#27500A','middle',10)}
  ${pats.map(p=>`<rect x="${p.x}" y="26" width="${p.w}" height="8" rx="2" fill="url(#fnO)" opacity="0.8"/><rect x="${p.x}" y="34" width="${p.w}" height="18" rx="2" fill="url(#fnC)" opacity="0.9"/>`).join('')}
  <rect x="22" y="52" width="176" height="6" rx="1" fill="url(#fnO)" opacity="0.6"/>
  <rect x="22" y="58" width="176" height="44" rx="4" fill="url(#fnS)"/>
  ${t(110,84,'Si 웨이퍼','#E6F1FB','middle',11)}
  ${t(26,106,'SiO₂','var(--color-text-tertiary)','start',8)}
  ${t(26,118,'회로홈','#0F6E56','start',8)}
  <line x1="104" y1="102" x2="104" y2="124" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>
  ${t(112,112,'7단계 수십~수백 회 반복','var(--color-text-secondary)','start',9)}
  ${t(112,125,'→ 수십억 트랜지스터 완성!','#1D9E75','start',9)}
  ${t(110,142,'스마트폰 CPU · 메모리 · GPU 모두 이렇게 만들어집니다','var(--color-text-secondary)','middle',9)}
  </svg>`;}

const DR={clean:drawClean,oxide:drawOxide,spin:drawSpin,expose:drawExpose,develop:drawDevelop,etch:drawEtch,final:drawFinal};

function render(){
  const s=S[cur];
  document.getElementById('sn').textContent=`STEP ${cur+1} / ${S.length}`;
  document.getElementById('st').textContent=s.ti;
  const tg=document.getElementById('stag');tg.textContent=s.tag.tx;tg.style.background=s.tag.b;tg.style.color=s.tag.c;
  const vis=document.getElementById('vis');
  DR[s.draw](vis,s.slider?s.slider.val:null,true);
  const slH=s.slider?`<div class="sr"><span>${s.slider.label}</span><input type="range" id="sl_${s.slider.id}" min="${s.slider.min}" max="${s.slider.max}" value="${s.slider.val}" step="${s.slider.step||1}" oninput="updSl()"><span class="sv" id="sv_${s.slider.id}">${s.slider.val} ${s.slider.unit}</span></div>`:'';
  document.getElementById('info').innerHTML=`
    <div><div class="lb">핵심 개념</div><div class="vl" style="font-weight:500">${s.concept}</div></div>
    <div><div class="lb">관련 식</div><div class="mn">${s.formula}</div></div>
    ${slH}
    <div><div class="lb">쉽게 이해하기</div><div class="vl" style="white-space:pre-line;font-size:13px">${s.easy}</div></div>
    <div><div class="ht">${s.hint}</div></div>`;
  const pg=document.getElementById('prog');pg.innerHTML='';
  S.forEach((_,i)=>{
    const d=document.createElement('div');d.className='pd'+(i<cur?' dn':i===cur?' on':'');d.textContent=i<cur?'✓':i+1;d.onclick=()=>{cur=i;render();};pg.appendChild(d);
    if(i<S.length-1){const l=document.createElement('div');l.className='pl'+(i<cur?' dn':'');pg.appendChild(l);}
  });
  document.getElementById('bp').disabled=cur===0;
  document.getElementById('bn').textContent=cur===S.length-1?'처음으로 ↺':'다음 →';
  document.getElementById('nl').textContent=`${cur+1} / ${S.length}`;
}
window.updSl=function(){
  const s=S[cur];if(!s.slider)return;
  const v=parseInt(document.getElementById('sl_'+s.slider.id).value);
  document.getElementById('sv_'+s.slider.id).textContent=v+' '+s.slider.unit;
  DR[s.draw](document.getElementById('vis'),v);
};
function go(d){if(d===1&&cur===S.length-1)cur=0;else cur=Math.max(0,Math.min(S.length-1,cur+d));render();}
render();
</script>
