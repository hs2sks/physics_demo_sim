<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학생 제출자료 (Student Submissions) — physics_demo_sim</title>
<style>
  :root {
    --bg: #f4f6fa; --panel: #ffffff; --ink: #1c2733; --sub: #5a6b7d;
    --accent: #1f6fd6; --ok: #1e8f4e; --border: #d7dee8; --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Segoe UI", "Malgun Gothic", sans-serif; background: var(--bg); color: var(--ink); padding: 20px; line-height: 1.6; }
  .wrap { max-width: 900px; margin: 0 auto; }
  .home { display: inline-block; color: var(--sub); text-decoration: none; font-size: 0.9em; margin-bottom: 14px; }
  .home:hover { color: var(--accent); }
  header { margin-bottom: 8px; }
  header h1 { font-size: 1.6em; }
  header .en { color: var(--sub); font-size: 0.6em; font-weight: 400; }
  header p { color: var(--sub); margin-top: 4px; }
  h2 { font-size: 1.15em; margin: 26px 0 12px; padding-bottom: 6px; border-bottom: 2px solid var(--border); display: flex; align-items: baseline; gap: 10px; }
  h2 .yr-en { font-size: 0.7em; color: var(--sub); font-weight: 400; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; text-decoration: none; color: inherit; display: block; transition: transform .1s, box-shadow .1s; }
  .card:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,.08); border-color: var(--accent); }
  .card .sem { font-family: monospace; font-size: 0.8em; color: var(--accent); letter-spacing: .04em; }
  .card .title { font-weight: 700; font-size: 1.1em; margin: 4px 0 2px; }
  .card .desc { color: var(--sub); font-size: 0.9em; }
  .card .meta { margin-top: 10px; font-size: 0.82em; color: var(--sub); }
  .card .meta b { color: var(--ink); }
  .empty { color: var(--sub); font-size: 0.9em; padding: 20px 0; }
  footer { margin-top: 32px; color: var(--sub); font-size: 0.85em; text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <a class="home" href="../index.html">← 홈으로</a>
  <header>
    <h1>🎓 학생 제출자료 <span class="en">Student Submissions</span></h1>
    <p>학생들이 수행평가로 제작한 시뮬레이션 모음입니다. 년도·학기별로 누적됩니다.
       개인 식별 정보(이름·학번)는 제외하고 공개합니다.</p>
  </header>

  <div id="list"></div>

  <footer>새 학기 자료 추가 방법은 이 파일의 주석을 참고하세요.</footer>
</div>

<!--
  ┌─────────────────────────────────────────────────────────────────┐
  │  새 학기 자료 추가하는 법 (How to add a new semester)             │
  │                                                                   │
  │  1) students/<year>-<semester>/ 폴더에 갤러리 HTML 파일을 넣는다  │
  │     예: students/2026-2/physics2-waves.html                       │
  │  2) 아래 submissions 배열에 항목을 하나 추가한다.                 │
  │     (year 내림차순, 최신이 위로 자동 정렬됨)                       │
  └─────────────────────────────────────────────────────────────────┘
-->
<script>
"use strict";
// 학생 제출자료 목록 — 새 학기가 생기면 여기에 한 줄 추가하세요.
const submissions = [
  {
    year: 2026, semester: 1,
    subject: "물리학2", unit: "역학",
    count: 31,
    desc: "바이브 코딩 수행평가 — 원운동·포물선·충돌·케플러·열역학 등 학생 제작 시뮬레이션",
    path: "2026-1/physics2-mechanics.html",
  },
  // { year: 2026, semester: 2, subject: "물리학2", unit: "파동", count: 0,
  //   desc: "...", path: "2026-2/physics2-waves.html" },
];

function render() {
  const host = document.getElementById("list");
  if (!submissions.length) { host.innerHTML = '<p class="empty">아직 등록된 자료가 없습니다.</p>'; return; }
  // 년도별 그룹 (최신 년도 먼저), 각 년도 안에서 학기 오름차순
  const years = [...new Set(submissions.map((s) => s.year))].sort((a, b) => b - a);
  host.innerHTML = years.map((yr) => {
    const items = submissions.filter((s) => s.year === yr).sort((a, b) => a.semester - b.semester);
    const cards = items.map((s) => `
      <a class="card" href="${s.path}">
        <div class="sem">${s.year}학년도 ${s.semester}학기</div>
        <div class="title">${s.subject} · ${s.unit}</div>
        <div class="desc">${s.desc}</div>
        <div class="meta">제출 <b>${s.count}</b>명</div>
      </a>`).join("");
    return `<h2>${yr}학년도 <span class="yr-en">${yr}</span></h2><div class="grid">${cards}</div>`;
  }).join("");
}
render();
</script>
</body>
</html>
