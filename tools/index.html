<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>분석 도구 — 물리 시뮬레이션</title>
<style>
  :root { --bg:#f4f6fa; --panel:#fff; --ink:#1c2733; --sub:#5a6b7d; --accent:#1f6fd6; --ok:#1e8f4e; --border:#d7dee8; --radius:12px; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:"Segoe UI","Malgun Gothic",sans-serif; background:var(--bg); color:var(--ink); padding:20px; line-height:1.6; }
  .wrap { max-width:900px; margin:0 auto; }
  .home { display:inline-block; color:var(--sub); text-decoration:none; font-size:0.9em; margin-bottom:14px; }
  .home:hover { color:var(--accent); }
  header h1 { font-size:1.6em; }
  header p { color:var(--sub); margin-top:4px; }
  h2 { font-size:1.15em; margin:26px 0 12px; padding-bottom:6px; border-bottom:2px solid var(--border); }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:14px; }
  .card { background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); padding:16px; text-decoration:none; color:inherit; display:block; transition:transform .1s, box-shadow .1s; }
  .card:hover { transform:translateY(-2px); box-shadow:0 6px 18px rgba(0,0,0,.08); border-color:var(--accent); }
  .card .icon { font-size:2em; }
  .card .title { font-weight:700; font-size:1.1em; margin:6px 0 2px; }
  .card .desc { color:var(--sub); font-size:0.9em; }
  .badge { display:inline-block; font-size:0.75em; padding:2px 8px; border-radius:20px; margin-top:8px; }
  .badge.done { background:#e3f4ea; color:var(--ok); }
</style>
</head>
<body>
<div class="wrap">
  <a class="home" href="../index.html">← 홈으로</a>
  <header>
    <h1>🧰 분석 도구</h1>
    <p>실험 영상·데이터 분석 도구</p>
  </header>
  <h2>도구</h2>
  <div class="grid">
    <a class="card" href="stroboscope/index.html">
      <div class="icon">📸</div>
      <div class="title">스트로보스코프</div>
      <div class="desc">운동 영상을 다중섬광사진으로 합성하고 위치를 찍어 x–t·v–t 그래프와 가속도를 분석 (Tracker 축소판)</div>
      <span class="badge done">✔ 완료</span>
    </a>
  </div>
</div>
</body>
</html>
